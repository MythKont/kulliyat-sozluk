<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Modern Sözlük</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3498db; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .thread-line { border-left: 2px solid #e5e7eb; margin-left: 1rem; padding-left: 1rem; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="loading" class="fixed inset-0 bg-white bg-opacity-80 z-50 hidden flex items-center justify-center">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12"></div>
    </div>

    <nav class="bg-white shadow-sm p-4 sticky top-0 z-40">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600">sozluk.js</h1>
            <div id="auth-buttons">
                </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 mt-6">
        <div id="new-topic-area" class="mb-8 hidden">
            <input id="topic-title" type="text" placeholder="Başlık aç..." class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
            <button onclick="createTopic()" class="mt-2 bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">Paylaş</button>
        </div>

        <div id="feed" class="space-y-6">
            </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
