<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Külliyat Sözlük | Wiki-Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; }
        .glass-panel { background: #1e1e1e; border: 1px solid #333; }
        .loader { border-top-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .thread-line { border-left: 2px solid #333; margin-left: 1.25rem; padding-left: 1rem; }
        .entry-card:hover { border-color: #444; }
    </style>
</head>
<body class="min-h-screen">
    <div id="loading" class="fixed inset-0 bg-black/80 z-50 hidden flex items-center justify-center">
        <div class="loader ease-linear rounded-full border-4 border-gray-700 h-12 w-12"></div>
    </div>

    <nav class="glass-panel sticky top-0 z-40 p-3 mb-6">
        <div class="max-w-[1400px] mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-8">
                <h1 class="font-bold text-xl tracking-tighter">LOGO: WIKI-FANDOM</h1>
                <div class="hidden md:flex space-x-6 text-sm font-medium text-gray-400">
                    <a href="#" class="text-white">ANA SAYFA</a>
                    <a href="#">KEŞFET</a>
                    <a href="#">SOHBET</a>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <input type="text" placeholder="Ara..." class="bg-[#2a2a2a] border border-[#444] rounded px-3 py-1 text-sm outline-none">
                <div id="auth-buttons" class="flex space-x-2"></div>
            </div>
        </div>
    </nav>

    <div class="max-w-[1400px] mx-auto grid grid-cols-1 md:grid-cols-12 gap-6 px-4">
        <aside class="md:col-span-2 space-y-6">
            <div class="space-y-4 text-gray-400 text-sm">
                <p class="text-white font-bold flex items-center"><span class="mr-2">👥</span> TOPLULUKLAR</p>
                <a href="#" class="block hover:text-white">📁 KATEGORİLER</a>
                <a href="#" class="block hover:text-white">📈 TRENDLER</a>
                <a href="#" class="block hover:text-white">🤝 ARKADAŞLAR</a>
            </div>
        </aside>

        <main class="md:col-span-7 space-y-6">
            <div id="new-topic-area" class="hidden glass-panel p-4 rounded-lg mb-6 border border-blue-900/20">
    <h3 class="text-[10px] font-bold text-blue-500 mb-3 tracking-widest uppercase">YENİ KONU AÇ</h3>
    
    <input type="text" id="topic-title" 
           class="w-full bg-[#121212] border border-[#333] rounded p-2 mb-2 text-xs text-white outline-none focus:border-blue-500 transition-all" 
           placeholder="Konu Başlığı (Örn: JavaScript Nedir?)">
    
    <textarea id="topic-content" 
              class="w-full bg-[#121212] border border-[#333] rounded p-3 mb-3 text-xs text-gray-300 outline-none focus:border-blue-500 transition-all min-h-[100px]" 
              placeholder="Konu içeriğini buraya detaylıca yaz..."></textarea>
    
    <div class="flex justify-end">
        <button onclick="createTopic()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded text-[10px] font-bold transition-all uppercase tracking-wider">
            KONUYU YAYINLA
        </button>
    </div>
</div>

            <p class="text-xs font-bold text-gray-500">SON GÖNDERİLER VE TARTIŞMALAR</p>
            <div id="feed" class="space-y-4"></div>
        </main>

        <aside class="md:col-span-3 space-y-6 text-xs">
            <div class="glass-panel p-4 rounded-lg">
                <p class="font-bold mb-4">GÜNCEL KONULAR</p>
                <div class="space-y-3 text-gray-400">
                    <p class="hover:text-white cursor-pointer">#Konu Başlığı 1 <span class="text-gray-600">(123)</span></p>
                    <p class="hover:text-white cursor-pointer">#Konu 2 <span class="text-gray-600">(89)</span></p>
                    <p class="hover:text-white cursor-pointer">#Haber 3 <span class="text-gray-600">(67)</span></p>
                </div>
            </div>
        </aside>
    </div>

    <div id="auth-modal" class="fixed inset-0 bg-black/90 z-50 hidden flex items-center justify-center">
        <div class="glass-panel p-8 rounded-xl w-96">
            <h2 id="modal-title" class="text-xl font-bold mb-4">Giriş Yap</h2>
            <input id="auth-user" type="text" placeholder="Kullanıcı Adı" class="w-full bg-[#2a2a2a] border border-[#444] p-2 mb-3 rounded outline-none">
            <input id="auth-pass" type="password" placeholder="Şifre" class="w-full bg-[#2a2a2a] border border-[#444] p-2 mb-6 rounded outline-none">
            <div class="flex justify-between">
                <button onclick="document.getElementById('auth-modal').classList.add('hidden')" class="text-gray-500">İptal</button>
                <button id="auth-submit-btn" class="bg-blue-600 px-6 py-2 rounded font-bold">Tamam</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
